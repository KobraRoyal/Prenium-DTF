[tool.pytest.ini_options]
DJANGO_SETTINGS_MODULE = "config.settings.test"
testpaths = ["tests", "backend/apps"]
python_files = ["test_*.py"]
addopts = "--strict-markers --strict-config"

[tool.ruff]
target-version = "py312"
line-length = 100
extend-exclude = [
  "backend/apps/*/migrations/*.py",
]

[tool.ruff.lint]
select = [
  "E",
  "F",
  "I",
  "B",
  "UP",
]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
