{% load portal_tags %}
{% if brand_home_href %}
  {% url brand_home_href as resolved_brand_home_url %}
{% else %}
  {% brand_home_url as resolved_brand_home_url %}
{% endif %}
<div class="ui-brand-lockup">
  <a class="ui-brand-lockup__mark" href="{{ resolved_brand_home_url }}" aria-label="{% if brand_home_label %}{{ brand_home_label }}{% elif request.user.is_authenticated %}Retour au tableau de bord{% else %}Accueil Prenium DTF{% endif %}">
    <span aria-hidden="true">P</span>
  </a>
  <div class="ui-brand-lockup__copy">
    <a class="ui-brand-lockup__name" href="{{ resolved_brand_home_url }}">Prenium DTF</a>
    <p class="ui-brand-lockup__subtitle">via IDS supply</p>
  </div>
</div>
