{% load portal_tags %}
{% if brand_home_href %}
  {% url brand_home_href as resolved_brand_home_url %}
{% else %}
  {% brand_home_url as resolved_brand_home_url %}
{% endif %}
<a class="ui-brand-lockup ui-brand-lockup__home" href="{{ resolved_brand_home_url }}" aria-label="{% if brand_home_label %}{{ brand_home_label }}{% elif request.user.is_authenticated %}Retour au tableau de bord{% else %}Accueil Prenium DTF{% endif %}">
  <span class="ui-brand-lockup__mark">
    <span aria-hidden="true">P</span>
  </span>
  <span class="ui-brand-lockup__copy">
    <span class="ui-brand-lockup__name">Prenium DTF</span>
    <span class="ui-brand-lockup__subtitle">via IDS supply</span>
  </span>
</a>
