<header class="app-header landing-saas-header agency-header" x-data="{ mobileNav: false }">
  <div class="app-main app-nav landing-saas-nav agency-nav max-md:flex-col max-md:items-stretch max-md:gap-3">
    <div class="ui-brand-row">
      <div class="landing-brand landing-brand--signature agency-brand">
        <a class="brand-link agency-brand__link" href="{% url 'home' %}">Prenium DTF</a>
        <p class="brand-subtitle agency-brand__subtitle">via IDS supply</p>
      </div>
      <div class="flex shrink-0 items-center gap-2 md:!hidden">
        <a class="btn btn-nav-cta landing-mobile-primary-cta" href="{% url 'prospects:step1' %}">Accès pro</a>
        <button
          type="button"
          class="agency-menu-toggle"
          data-landing-menu-toggle="landing-primary-nav"
          @click="mobileNav = !mobileNav"
          aria-expanded="false"
          :aria-expanded="mobileNav"
          aria-controls="landing-primary-nav"
          aria-label="Ouvrir le menu"
        >
          <span class="agency-menu-toggle__lines" aria-hidden="true"><span></span><span></span><span></span></span>
          <span class="ui-sr-only">Menu</span>
        </button>
      </div>
    </div>
    <nav
      id="landing-primary-nav"
      class="nav-group landing-saas-nav__links agency-nav__links !hidden w-full flex-col flex-wrap gap-1 md:!flex md:w-auto md:flex-row md:items-center md:gap-2"
      data-landing-menu
      :class="{ '!flex': mobileNav }"
    >
      <a class="nav-link nav-link--ghost agency-nav__link" href="{% url 'home' %}#landing-services">Services</a>
      <a class="nav-link nav-link--ghost agency-nav__link" href="{% url 'home' %}#landing-cases">Cas</a>
      <a class="nav-link nav-link--ghost agency-nav__link" href="{% url 'home' %}#landing-team">Équipe</a>
      <a class="nav-link nav-link--ghost agency-nav__link" href="{% url 'home' %}#landing-contact">Contact</a>
      <a class="nav-link nav-link--ghost agency-nav__link" href="{% url 'portal:login' %}">Espace client</a>
      <a class="btn btn-nav-cta agency-nav__cta" href="{% url 'services' %}">Commander</a>
    </nav>
  </div>
</header>
