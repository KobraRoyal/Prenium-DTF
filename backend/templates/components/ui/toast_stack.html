<div
  class="ui-toast-stack pointer-events-none fixed right-4 top-4 z-[100] flex w-[min(100vw-2rem,24rem)] flex-col gap-3"
  x-data="toastStack()"
  @prenium-toast.window="push($event.detail)"
  aria-live="polite"
>
  <template x-for="t in items" :key="t.id">
    <div
      class="pointer-events-auto ui-toast dui-alert shadow-lg"
      :class="variantClass(t.variant)"
      role="status"
    >
      <span x-text="t.message"></span>
    </div>
  </template>
</div>
