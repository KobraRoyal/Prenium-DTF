services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  web:
    build:
      context: .
      dockerfile: infra/docker/backend/Dockerfile
      target: dev
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DJANGO_STATIC_ROOT: ${DJANGO_STATIC_ROOT:-/var/app/static}
      DJANGO_MEDIA_ROOT: ${DJANGO_MEDIA_ROOT:-/var/app/media}
    command: ["sh", "infra/scripts/web-entrypoint.sh"]
    volumes:
      - .:/app
      - django_static:/var/app/static
      - django_media:/var/app/media
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    expose:
      - "8000"
    healthcheck:
      test: ["CMD-SHELL", "cd /app/backend && python manage.py healthcheck"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  worker:
    build:
      context: .
      dockerfile: infra/docker/backend/Dockerfile
      target: dev
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DJANGO_STATIC_ROOT: ${DJANGO_STATIC_ROOT:-/var/app/static}
      DJANGO_MEDIA_ROOT: ${DJANGO_MEDIA_ROOT:-/var/app/media}
    command: ["sh", "infra/scripts/worker-entrypoint.sh"]
    volumes:
      - .:/app
      - django_media:/var/app/media
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "cd /app/backend && celery -A config inspect ping -d celery@$$HOSTNAME --timeout=5 | grep -q OK",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  beat:
    build:
      context: .
      dockerfile: infra/docker/backend/Dockerfile
      target: dev
    restart: unless-stopped
    env_file:
      - .env
    command: ["sh", "infra/scripts/beat-entrypoint.sh"]
    volumes:
      - .:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "test -s /tmp/celerybeat.pid && kill -0 $$(cat /tmp/celerybeat.pid)"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  nginx:
    build:
      context: .
      dockerfile: infra/docker/nginx/Dockerfile
    restart: unless-stopped
    depends_on:
      web:
        condition: service_healthy
    volumes:
      - django_static:/var/www/static:ro
    ports:
      - "${NGINX_PORT:-8080}:80"
    healthcheck:
      test: ["CMD-SHELL", "curl --fail http://localhost/healthz/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  postgres_data:
  django_static:
  django_media:
