repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-yaml
      - id: check-toml
      - id: end-of-file-fixer
      - id: trailing-whitespace
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.8
    hooks:
      - id: ruff
        args: ["--fix"]
      - id: ruff-format
  - repo: local
    hooks:
      - id: codex-agent-contracts
        name: validate Codex agent contracts
        entry: python scripts/check_codex_agents.py
        language: python
        additional_dependencies: ["tomli==2.2.1"]
        pass_filenames: false
        files: ^(\.codex/|AGENTS\.md$|docs/architecture/CODEX_AGENT_ORCHESTRATION\.md$)
